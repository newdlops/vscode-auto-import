name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build-daemon:
    name: Daemon (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
            ext: ''
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: darwin-x64
            ext: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            ext: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win32-x64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: cargo-${{ matrix.suffix }}-${{ hashFiles('daemon/Cargo.lock') }}
      - name: Build daemon
        working-directory: daemon
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: autoimport-daemon-${{ matrix.suffix }}
          path: daemon/target/${{ matrix.target }}/release/autoimport-daemon${{ matrix.ext }}
          if-no-files-found: error

  package-extension:
    name: Package .vsix
    needs: build-daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install extension deps
        run: npm ci
      - name: Download all daemon artifacts
        uses: actions/download-artifact@v4
        with:
          path: daemon-artifacts
      - name: Collect daemon binaries
        shell: bash
        run: |
          mkdir -p resources/bin
          for dir in daemon-artifacts/autoimport-daemon-*/; do
            name=$(basename "$dir")
            suffix=${name#autoimport-daemon-}
            ext=""
            [[ "$suffix" == win32-* ]] && ext=".exe"
            src_path=$(find "$dir" -type f -name "autoimport-daemon*" | head -1)
            dest="resources/bin/autoimport-daemon-${suffix}${ext}"
            cp "$src_path" "$dest"
            chmod +x "$dest"
          done
          ls -la resources/bin
      - name: Build extension
        run: npm run build:prod
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Package
        run: vsce package --no-dependencies
      - name: Upload vsix
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run E2E (Linux needs xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:e2e
      - name: Run E2E (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run test:e2e

  release:
    name: Publish release assets
    needs: [package-extension, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: dist
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
