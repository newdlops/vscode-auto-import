name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  daemon-build:
    name: Daemon source build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            daemon/target
          key: cargo-native-${{ runner.os }}-${{ hashFiles('daemon/Cargo.lock') }}
      - name: Build daemon from source
        working-directory: daemon
        run: cargo build --release --locked

  package-extension:
    name: Package .vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install extension deps
        run: npm ci
      - name: Check extension types
        run: npm run check
      - name: Verify release layout
        run: npm run verify:release
      - name: Build extension
        run: npm run build:prod
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Package
        run: vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'

  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run E2E (Linux needs xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test:e2e
      - name: Run E2E (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run test:e2e

  release:
    name: Publish release assets
    needs: [daemon-build, package-extension, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: dist
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.vsix
