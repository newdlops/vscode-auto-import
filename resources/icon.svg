<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer card -->
  <rect x="0" y="0" width="128" height="128" rx="22" fill="#0d1117"/>
  <rect x="4" y="4" width="120" height="120" rx="20" fill="#2a313c"/>
  <rect x="6" y="6" width="116" height="116" rx="18" fill="#161b22"/>

  <!-- Document on the right with drop shadow -->
  <rect x="60" y="28" width="52" height="80" rx="8" fill="#000" opacity="0.35"/>
  <rect x="58" y="24" width="52" height="80" rx="8" fill="#b3bcc9"/>
  <rect x="59" y="25" width="50" height="78" rx="7" fill="#e6edf3"/>

  <!-- Code lines (the highlighted one is the imported symbol) -->
  <rect x="66" y="36" width="28" height="4" rx="2" fill="#8b949e"/>
  <rect x="66" y="49" width="34" height="4" rx="2" fill="#58a6ff"/>
  <rect x="66" y="62" width="22" height="4" rx="2" fill="#8b949e"/>
  <rect x="66" y="75" width="30" height="4" rx="2" fill="#8b949e"/>
  <rect x="66" y="88" width="16" height="4" rx="2" fill="#8b949e"/>

  <!-- Symbol "chip" flying into the document -->
  <rect x="20" y="29" width="26" height="18" rx="5" fill="#000" opacity="0.3"/>
  <rect x="18" y="26" width="26" height="18" rx="5" fill="#79c0ff"/>
  <rect x="19" y="27" width="24" height="16" rx="4" fill="#1f6feb"/>
  <rect x="23" y="31" width="10" height="2" rx="1" fill="#79c0ff"/>
  <rect x="23" y="36" width="14" height="2" rx="1" fill="#79c0ff"/>

  <!-- Curved arrow from chip to the highlighted line -->
  <path d="M 44 34 Q 50 42 55 50" stroke="#58a6ff" stroke-width="5" stroke-linecap="round" fill="none"/>
  <polygon points="55,44 55,56 67,50" fill="#58a6ff"/>
</svg>
